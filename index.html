<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>White Bear Thought Monitoring</title>
  <link href="https://cdn.jsdelivr.net/npm/jspsych@7.4.0/dist/css/jspsych.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/jspsych@7.4.0/dist/jspsych.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-html-keyboard-response@1.4.0/dist/jspsych-html-keyboard-response.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-survey-likert@1.4.0/dist/jspsych-survey-likert.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-survey-text@1.4.0/dist/jspsych-survey-text.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-call-function@1.4.0/dist/jspsych-call-function.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@jspsych-contrib/plugin-pipe@1.0.2/dist/jspsych-pipe.js"></script>
  <style>
    .jspsych-content-wrapper {
      max-width: 900px;
      margin: auto;
      font-size: 1.05rem;
      line-height: 1.6;
    }
  </style>
</head>
<body></body>
<script>
  const jsPsych = initJsPsych();

  // Replace with your DataPipe experiment ID before deploying.
  const pipe_id = "JX4hJtjy26fD";
  const filename = `whitebear_${jsPsych.randomization.randomID(8)}.csv`;

  const condition = jsPsych.randomization.sampleWithoutReplacement([0, 1], 1)[0];

  const passages = [
    `<h2>Condition 1</h2>
     <p>In the quiet morning, the city was blanketed by fog. You read carefully while your mind wanders through small details of the story.</p>
     <p>The streetlights flicker, a cat crosses in the distance, and the hum of traffic becomes a background melody. While reading, you are asked not to think about a white bear. If a white bear comes to mind, press the spacebar immediately.</p>
     <p>The story continues, describing the slow opening of a bookstore, the smell of paper, and the rustling of pages. Continue reading until the task ends.</p>`,
    `<h2>Condition 2</h2>
     <p>On a long hiking trail, the sun filters through towering trees. You follow the narrative as the trail curves past mossy rocks and quiet streams.</p>
     <p>Birdsong fills the air, and your eyes trace each word. Remember: do not think about a white bear. If the image appears, press the spacebar immediately.</p>
     <p>The trail description continues with a visitor pausing beside a waterfall, feeling the mist on their skin, and noticing each detail of the forest. Continue reading until the task ends.</p>`
  ];

  let startTime = null;
  let pressCount = 0;
  const totalTaskDuration = 5 * 60 * 1000;

  const welcome = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `<h1>Welcome</h1>
      <p>In this task, you will read a long passage for 5 minutes.</p>
      <p>Your instruction: do not think about a white bear.</p>
      <p>Every time you think about a white bear while reading, press the <strong>spacebar</strong>.</p>
      <p>After each press, you will answer a quick feeling question.</p>
      <p>Press the <strong>spacebar</strong> to begin.</p>`,
    choices: [' ']
  };

  const setStartTime = {
    type: jsPsychCallFunction,
    func: function() {
      startTime = Date.now();
    }
  };

  const readingTrial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: passages[condition],
    choices: [' '],
    trial_duration: function() {
      const elapsed = Date.now() - startTime;
      const remaining = totalTaskDuration - elapsed;
      return remaining > 0 ? remaining : 0;
    },
    response_ends_trial: true,
    prompt: `<p><strong>Press space each time you think about a white bear.</strong></p>
             <p>You may continue reading until the task time ends.</p>`,
    on_finish: function(data) {
      const elapsed = Date.now() - startTime;
      data.condition = condition + 1;
      data.event = data.response === null ? 'timeout' : 'white_bear_press';
      data.press_number = data.response === null ? null : ++pressCount;
      data.elapsed_ms = elapsed;
      data.total_presses = pressCount;
    }
  };

  const feelingTrial = {
    type: jsPsychSurveyLikert,
    preamble: '<p>You pressed the spacebar because you thought about a white bear.</p>',
    questions: [{
      prompt: 'How are you feeling right now?',
      labels: ['Very negative', 'Negative', 'Neutral', 'Positive', 'Very positive'],
      required: true,
      name: 'feeling'
    }],
    data: { event: 'feeling_rating' }
  };

  const feelingNode = {
    timeline: [feelingTrial],
    conditional_function: function() {
      const last = jsPsych.data.get().last(1).values()[0];
      return last.event === 'white_bear_press';
    }
  };

  const readingLoop = {
    timeline: [readingTrial, feelingNode],
    loop_function: function() {
      const elapsed = Date.now() - startTime;
      return elapsed < totalTaskDuration;
    }
  };

  const endReading = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `<h2>Reading period complete</h2>
               <p>The 5-minute reading task is finished.</p>
               <p>Press Space to continue to demographic questions.</p>`,
    choices: [' ']
  };

  const demographics = {
    type: jsPsychSurveyText,
    preamble: '<h3>Demographics</h3><p>Please answer the following questions.</p>',
    questions: [
      {prompt: 'What is your gender?', required: true, name: 'gender'},
      {prompt: 'What is your age?', required: true, name: 'age'},
      {prompt: 'What is your highest completed level of education?', required: true, name: 'education'}
    ],
    data: { event: 'demographics' }
  };

  const saveData = {
    type: jsPsychPipe,
    action: 'save',
    experiment_id: pipe_id,
    filename: filename,
    data_string: function() {
      return jsPsych.data.get().csv();
    }
  };

  const goodbye = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `<h2>Thank you</h2>
               <p>Your responses have been recorded.</p>
               <p>You may now close this page.</p>`,
    choices: [' ']
  };

  const timeline = [
    welcome,
    setStartTime,
    readingLoop,
    endReading,
    demographics,
    saveData,
    goodbye
  ];

  jsPsych.run(timeline);
</script>
</html>
