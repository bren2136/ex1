<!DOCTYPE html>
<html>
<head>
  <title>Reading Study</title>
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
  <link href="https://unpkg.com/css/jspsych.css" rel="stylesheet" type="text/css" />
</head>
<body></body>
<script>
  // 1. Initialize jsPsych
  const jsPsych = initJsPsych();

  // 2. Setup DataPipe: Replace with your actual DataPipe ID
  const pipe_id = "JX4hJtjy26fD";
  const filename = `${jsPsych.randomization.randomID(10)}.csv`;

  // 3. Randomize Between-Subject Condition (0 or 1)
  // DataPipe handles this sequentially; for local testing we randomize.
  const condition = jsPsych.randomization.sampleWithoutReplacement([0, 1], 1)[0];

  // 4. Define Stimuli based on condition
  const textContent = (condition === 0) ? 
    "<h1>Condition A</h1><p>Read this text and press space.</p>" : 
    "<h1>Condition B</h1><p>Read this different text and press space.</p>";

  // 5. Timeline creation
  const timeline = [];

  // Welcome Screen
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: "Welcome. Press Space to start."
  });

  // Reading Screen (Looping for multiple spacebar presses)
  let pressCount = 0;
  const readingTrial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: textContent,
    choices: [' '], // Only allow spacebar
    on_finish: function(data) {
      pressCount++;
      // Add info to each trial
      data.condition = condition;
      data.total_presses = pressCount;
    }
  };

  // Question Screen
  const questionTrial = {
    type: jsPsychSurveyText,
    questions: [{prompt: 'How do you feel right now?', required: true}],
  };

  // Loop: Reading -> Question -> Back to Reading (Stop after 5 times, for example)
  const experimentLoop = {
    timeline: [readingTrial, questionTrial],
    loop_function: function(data) {
      return pressCount < 5; // Repeats 5 times
    }
  };
  timeline.push(experimentLoop);

  // 6. DataPipe Saving Trial
  const save_data = {
    type: jsPsychPipe,
    action: "save",
    experiment_id: pipe_id,
    filename: filename,
    data_string: () => jsPsych.data.get().csv()
  };
  timeline.push(save_data);

  // 7. Run Experiment
  jsPsych.run(timeline);
</script>
</html>
